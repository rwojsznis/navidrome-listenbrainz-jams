# Example deployment of navidrome-listenbrainz-jams alongside EXISTING Navidrome
# and slskd instances (e.g. on a NAS). Adjust paths, image, and network.
#
# The service needs to reach Navidrome and slskd over HTTP (set their URLs in
# config.yaml) and share two filesystem locations with them:
#   - A dedicated import folder INSIDE Navidrome's library -> mounted read-write.
#     Mount only this subfolder (not the whole library) so the service can't
#     touch the rest of your collection.
#   - slskd's completed downloads -> mounted read-only (files are read+moved out)

services:
  navidrome-lb-jams:
    # Build locally, or push to a registry and reference the image.
    build: .
    # image: ghcr.io/rwojsznis/navidrome-listenbrainz-jams:latest
    container_name: navidrome-lb-jams
    restart: unless-stopped
    ports:
      - "8080:8080"   # read-only status dashboard
    environment:
      # Secrets referenced via ${ENV} in config.yaml.
      SLSKD_API_KEY: ${SLSKD_API_KEY}
      EMQ_NAVIDROME_PASS: ${EMQ_NAVIDROME_PASS}
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      - ./state:/data                                  # persists state.db
      # A subfolder of Navidrome's library (which scans /volume1/music). Only
      # this folder is exposed to the service, read-write.
      - /volume1/music/lb-jams:/import
      - /volume1/docker/slskd/downloads:/downloads:ro  # slskd completed downloads
    # If Navidrome/slskd run in Docker, put this service on their network so it
    # can reach them by service name; otherwise use the NAS host IP in config.yaml.
    # networks: [media]

# networks:
#   media:
#     external: true
