# navidrome-listenbrainz-jams configuration.
# String values support ${ENV} and ${ENV:-default} interpolation, so secrets can
# be supplied via environment variables instead of being committed in plaintext.

# How often the daemon re-checks feeds and advances in-progress playlists.
poll_interval: 30m

navidrome:
  url: http://navidrome:4533
  # Optional admin credentials, used only for triggering library rescans
  # (Subsonic startScan requires an admin user; regular users get a
  # "not authorized" error). If omitted, the first feed's user is used and must
  # itself be an admin. Set these when your feed users are not admins.
  # admin_user: admin
  # admin_pass: ${NAVIDROME_ADMIN_PASS}

slskd:
  url: http://slskd:5030
  api_key: ${SLSKD_API_KEY}

paths:
  # slskd's completed-downloads directory (mount read-write — files are moved
  # out of here into import_dir, so the service must be able to delete them).
  slskd_downloads: /downloads
  # Directory where imported files are written (mount read-write). It must be a
  # subfolder of Navidrome's music library so Navidrome indexes the files — mount
  # ONLY this folder, not the whole library, so the service can't touch anything
  # else. E.g. host /volume1/music/lb-jams -> /import, Navidrome library at
  # /volume1/music.
  import_dir: /import

download:
  # Preference order when picking a candidate from slskd search results.
  format_preference: [flac, mp3]
  min_bitrate: 256
  per_track_timeout: 2h
  max_retries: 3

matching:
  # Minimum normalized similarity (0..1) to accept a search hit as a match.
  fuzzy_threshold: 0.85

state:
  db_path: /data/state.db

fingerprint:
  # Optional acoustic-fingerprinting step. When enabled, each freshly downloaded
  # file is identified with Chromaprint (fpcalc) + AcoustID, and its MusicBrainz
  # recording id is written into the file's tags so Navidrome indexes it. The
  # download is trusted (no rejection on mismatch); a no-match leaves the file
  # untagged. Requires the `fpcalc` and `opustags` binaries (bundled in the
  # Docker image) and a free AcoustID *application* API key. Register an
  # application at https://acoustid.org/new-application to get one — this is the
  # "client" key used for lookups, NOT the user/account API key (which is only
  # for submitting fingerprints and will be rejected here with "invalid API key").
  enabled: false
  acoustid_api_key: ${ACOUSTID_API_KEY:-}
  # Override only if the binaries aren't on PATH.
  fpcalc_path: fpcalc
  opustags_path: opustags

lyrics:
  # Optional lyrics fetching. When enabled, each freshly imported file gets a
  # sibling "<Artist> - <Title>.lrc" written from lrclib.net (synced/timestamped
  # lyrics preferred, plain text as fallback) so Navidrome can display them. A
  # ".lrc" that already exists is left untouched, and a track with no lyrics
  # (or an instrumental) is simply skipped. Best-effort: failures never block an
  # import. Uses only the artist + title already in the feed (no extra config).
  enabled: false
  # lrclib API base URL. Override only to point at a self-hosted mirror.
  lrclib_url: https://lrclib.net

web:
  # Read-only status dashboard address. Empty disables it.
  listen: ":8080"

# One entry per ListenBrainz RSS feed. Multiple feeds and multiple users are
# supported; each feed's playlist is created owned by its navidrome_user.
feeds:
  - name: emq-weekly-jams
    rss_url: "https://listenbrainz.org/syndication-feed/user/emq/recommendations?recommendation_type=weekly-jams"
    navidrome_user: emq
    navidrome_pass: ${EMQ_NAVIDROME_PASS}
