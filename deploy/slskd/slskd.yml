# slskd configuration for the local dev stack.
# Docs: https://github.com/slskd/slskd/blob/master/docs/config.md

directories:
  downloads: /downloads
  incomplete: /incomplete

# Auto-purge old records as a backstop. The service already removes its own
# searches and completed/failed transfers, so this mainly covers anything it
# misses (e.g. while the service is down). Values are in MINUTES.
# NOTE: keep download.succeeded generous — the service imports the file FROM the
# completed transfer record, so purging it too soon (before an import) would make
# the service re-download. Do NOT set files.complete: the service moves completed
# files out itself; auto-deleting them risks losing a file it hasn't imported yet.
retention:
  search: 60                # remove searches an hour after completion
  transfers:
    download:
      succeeded: 4320       # 3 days (backstop; service removes these on import)
      errored: 1440         # 1 day
      cancelled: 1440       # 1 day
      failed: 1440          # 1 day
  files:
    incomplete: 1440        # clean up stuck partial downloads after a day

# Share the assembled weekly-jams playlist back to the network. Bind-mounted
# read-only at /shared/weekly-jams in docker-compose.yaml.
shares:
  directories:
    - /shared/weekly-jams

# Limit how much we give back: a single upload slot and ~1 MB/s total.
# speed_limit is in kibibytes per second (1024 KiB/s ≈ 1 MB/s).
transfers:
  global:
    upload:
      slots: 1
      speed_limit: 1024

web:
  # The service authenticates to slskd's REST API with this key (sent as the
  # X-API-Key header). Matches `slskd.api_key` in config.local.yaml.
  authentication:
    api_keys:
      navidrome-jams:
        key: dev-slskd-api-key-change-me
        cidr: 0.0.0.0/0,::/0

# slsk.username / slsk.password are supplied via environment variables
# (SLSKD_SLSK_USERNAME / SLSKD_SLSK_PASSWORD) in docker-compose.yaml.
