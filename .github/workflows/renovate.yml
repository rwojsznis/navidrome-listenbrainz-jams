name: Renovate

on:
  schedule:
    # Every day at 05:00 UTC.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry run (no PRs/branches created)"
        type: boolean
        default: false

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: info
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || null }}
