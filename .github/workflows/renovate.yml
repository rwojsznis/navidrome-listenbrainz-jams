name: Renovate

on:
  schedule:
    # Every day at 05:00 UTC.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry run (no PRs/branches created)"
        type: boolean
        default: false

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: info
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || null }}
          # postUpgradeTasks in renovate.json refreshes the pinned yt-dlp/deno
          # SHA256s. Running a shell command is gated behind this allowlist, which
          # for security can only be set in the bot's (global) config, not the
          # repo's renovate.json. The regex must match the command exactly.
          RENOVATE_ALLOWED_COMMANDS: '["^bash \\.github/scripts/update-binary-shas\\.sh Dockerfile$"]'
