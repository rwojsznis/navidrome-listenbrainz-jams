name: CI

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # Publish only on pushes to main (-> `latest`) and version tags (-> e.g. `0.1.0`).
  # Never on pull requests. Gated on the test job so nothing ships red.
  publish:
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
